



<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Riad Dar D'Art — Guest Assistant</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f0e8; height: 100dvh; overflow: hidden; }
  #main-app { display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
  #tab-bar { display: flex; background: #fff; border-bottom: 1px solid #ece9e2; flex-shrink: 0; z-index: 10; }
  .tab { flex: 1; padding: 14px 8px; text-align: center; font-size: 13px; font-weight: 500; color: #999; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .tab.active { color: #0F6E56; border-bottom-color: #1D9E75; }
  .screen { display: none; padding: 14px 14px 40px; max-width: 480px; margin: 0 auto; }
  .screen.active { display: block; }
  #tab-chat.active { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 0 14px; max-width: 480px; margin: 0 auto; width: 100%; }
  #tab-checkout.active { flex: 1; display: block; overflow-y: auto; }

  /* ── LANGUAGE SCREEN — FIX 2: Premium luxury design ── */
  #lang-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    background: #f5f0e8;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c8bc5a' fill-opacity='0.07'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .lang-logo { margin-bottom: 20px; }
  .lang-riad-name { font-size: 22px; font-weight: 700; color: #1a1a1a; letter-spacing: 0.5px; margin-bottom: 4px; text-align: center; font-family: Georgia, serif; }
  .lang-subtitle { font-size: 13px; color: #8a7d6a; margin-bottom: 36px; text-align: center; letter-spacing: 0.3px; }
  .lang-choose { font-size: 11px; font-weight: 600; color: #8a7d6a; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; text-align: center; }
  .lang-list { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 320px; }
  .lang-btn {
    padding: 14px 20px;
    background: #fff;
    border: 1px solid #e0d8cc;
    border-left: 3px solid transparent;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    text-align: left;
    color: #2a2a2a;
    transition: all 0.18s;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .lang-btn:hover { border-left-color: #1D9E75; background: #faf8f4; color: #0F6E56; }
  .lang-flag { font-size: 20px; width: 28px; text-align: center; }
  .lang-name { flex: 1; }
  .lang-native { font-size: 11px; color: #999; font-weight: 400; }
  .lang-arrow { font-size: 14px; color: #ccc; }
  .lang-btn:hover .lang-arrow { color: #1D9E75; }

  /* HEADER */
  .riad-header { text-align: center; padding: 18px 0 14px; }
  .riad-icon { display: flex; justify-content: center; }
  .riad-title { font-size: 17px; font-weight: 700; color: #1a1a1a; margin-top: 6px; }
  .riad-sub { font-size: 12px; color: #999; margin-top: 3px; }
  .riad-logo-sm { width: 60px; height: 60px; object-fit: contain; }

  /* CHAT */
  #chat-box {
    background: #ffffff;
    border-radius: 0;
    border: none;
    border-top: 1px solid #f0ede8;
    border-bottom: 1px solid #f0ede8;
    padding: 16px 14px;
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 10px;
  }
  #suggestions-label { font-size: 11px; font-weight: 600; color: #999; letter-spacing: 0.5px; margin-bottom: 4px; text-transform: uppercase; }
  .msg { max-width: 88%; padding: 10px 13px; border-radius: 10px; font-size: 13px; line-height: 1.6; }
  .msg-bot { background: #f4f4f4; border: none; color: #1a1a1a; align-self: flex-start; border-radius: 4px 14px 14px 14px; }
  .msg-user { background: #1D9E75; color: #fff; align-self: flex-end; border-radius: 10px 4px 10px 10px; }
  .msg-loading { color: #bbb; font-style: italic; }

  .action-card { background: #fff; border: 1px solid #ece9e2; border-radius: 10px; padding: 12px 14px; align-self: flex-start; width: 95%; }
  .action-card-title { font-size: 12px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; }
  .action-btn { display: block; width: 100%; padding: 9px 12px; border-radius: 8px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; margin-bottom: 6px; font-family: inherit; text-decoration: none; }
  .action-btn:last-child { margin-bottom: 0; }
  .btn-green { background: #E1F5EE; color: #0F6E56; }
  .btn-teal { background: #1D9E75; color: #fff; }
  .btn-blue { background: #003580; color: #fff; }
  .btn-reception { background: #E1F5EE; color: #0F6E56; }
  .btn-wa { background: #25D366; color: #fff; }
  .btn-red { background: #FCEBEB; color: #A32D2D; }
  .btn-maps { background: #E8F0FE; color: #1a56db; }

  /* BOOKING FORM */
  .booking-form { background: #fff; border: 1px solid #ece9e2; border-radius: 12px; padding: 14px; align-self: flex-start; width: 95%; }
  .bf-title { font-size: 13px; font-weight: 700; color: #1a1a1a; margin-bottom: 10px; }
  .bf-info { font-size: 11px; color: #777; background: #f7f5f0; border-radius: 8px; padding: 8px 10px; margin-bottom: 12px; line-height: 1.7; }
  .bf-section { margin-bottom: 12px; }
  .bf-label { font-size: 11px; font-weight: 600; color: #555; margin-bottom: 6px; }
  .bf-options { display: flex; flex-wrap: wrap; gap: 6px; }
  .bf-opt { padding: 7px 12px; border-radius: 20px; border: 1px solid #ddd; background: #fafaf8; font-size: 12px; cursor: pointer; color: #555; transition: all 0.15s; font-family: inherit; }
  .bf-opt.selected { background: #E1F5EE; border-color: #1D9E75; color: #0F6E56; font-weight: 600; }
  .bf-input { width: 100%; padding: 8px 11px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; font-family: inherit; outline: none; background: #fafaf8; color: #333; margin-top: 2px; }
  .bf-input:focus { border-color: #1D9E75; }
  .bf-price { font-size: 13px; color: #0F6E56; font-weight: 700; min-height: 20px; margin-bottom: 10px; }
  .bf-submit { width: 100%; padding: 11px; background: #1D9E75; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }

  #suggestions { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .sug { font-size: 11px; padding: 6px 12px; border-radius: 20px; border: 1px solid #ddd; background: #fff; color: #666; cursor: pointer; transition: border-color 0.15s; }
  .sug:hover { border-color: #1D9E75; color: #1a1a1a; }
  .sug-spa { background: #fef0fb; border-color: #d48fd4; color: #7a3b7a; font-weight: 500; }
  .sug-checkout { background: #fef3e2; border-color: #f0a500; color: #854F0B; font-weight: 500; }
  .sug-emergency { background: #FCEBEB; border-color: #E24B4A; color: #A32D2D; font-weight: 500; }
  .sug-location { background: #E8F0FE; border-color: #4285f4; color: #1a56db; font-weight: 500; }
  .sug-restaurants { background: #fff5e6; border-color: #e8a838; color: #7a4a05; font-weight: 500; }

  #input-row { display: flex; gap: 8px; flex-shrink: 0; padding-bottom: 12px; }
  #chat-input { flex: 1; padding: 10px 13px; font-size: 13px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #1a1a1a; font-family: inherit; outline: none; }
  #chat-input:focus { border-color: #1D9E75; }
  #send-btn { padding: 10px 16px; background: #1D9E75; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  #send-btn:disabled { opacity: 0.5; }

  /* SURVEY */
  .survey-header { text-align: center; padding: 16px 0 12px; }
  .s-title { font-size: 17px; font-weight: 700; color: #1a1a1a; }
  .s-sub { font-size: 12px; color: #999; margin-top: 3px; }
  .card { background: #fff; border-radius: 14px; padding: 16px; margin-bottom: 12px; border: 1px solid #ece9e2; }
  .card-title { font-size: 14px; font-weight: 600; color: #1a1a1a; margin-bottom: 3px; }
  .card-sub { font-size: 12px; color: #999; margin-bottom: 12px; }
  .stars { display: flex; gap: 8px; margin-bottom: 8px; }
  .star { font-size: 26px; cursor: pointer; filter: grayscale(1) opacity(0.3); transition: transform 0.1s; }
  .star.active { filter: none; transform: scale(1.1); }
  .star-label { font-size: 11px; color: #0F6E56; font-weight: 600; min-height: 16px; margin-bottom: 10px; }
  .s-textarea { width: 100%; padding: 9px 11px; border: 1px solid #e0ddd6; border-radius: 8px; font-size: 13px; font-family: inherit; color: #333; resize: none; outline: none; background: #fafaf8; }
  .s-textarea:focus { border-color: #1D9E75; }
  .tried-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .tried-btn { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #e0ddd6; background: #fafaf8; font-size: 12px; font-weight: 500; cursor: pointer; text-align: center; color: #555; transition: all 0.15s; }
  .tried-btn.selected { background: #E1F5EE; border-color: #1D9E75; color: #0F6E56; }
  .name-input { width: 100%; padding: 10px 12px; border: 1px solid #e0ddd6; border-radius: 8px; font-size: 13px; font-family: inherit; color: #333; outline: none; background: #fafaf8; }
  .name-input:focus { border-color: #1D9E75; }
  .extra-label { font-size: 12px; font-weight: 600; color: #555; margin-bottom: 6px; margin-top: 8px; }
  #submit-survey-btn { width: 100%; padding: 14px; background: #1D9E75; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 4px; }
  #submit-survey-btn:disabled { opacity: 0.5; }
  #thankyou-screen { display: none; text-align: center; padding: 40px 10px 20px; }
  @keyframes farewellPulse {
    0%   { box-shadow: 0 0 0 0 rgba(200,188,90,0.7); }
    50%  { box-shadow: 0 0 0 12px rgba(200,188,90,0.2); }
    100% { box-shadow: 0 0 0 0 rgba(200,188,90,0); }
  }
  .ty-icon { margin-bottom: 12px; display: flex; justify-content: center; }
  .ty-title { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
  .ty-sub { font-size: 14px; color: #666; line-height: 1.7; margin-bottom: 28px; }
  .review-card { background: #fff; border-radius: 14px; padding: 18px; border: 1px solid #ece9e2; }
  .review-card-title { font-size: 13px; font-weight: 600; color: #1a1a1a; margin-bottom: 12px; text-align: center; }
  .review-btn { display: block; width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; margin-bottom: 8px; font-family: inherit; text-decoration: none; }
  .review-btn:last-child { margin-bottom: 0; }

  /* ── NAME / INSTRUCTION / SAVE SCREENS ── */
  .onboarding-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
    background: #f5f0e8;
    text-align: center;
  }
  .onb-title { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
  .onb-sub { font-size: 13px; color: #666; margin-bottom: 28px; line-height: 1.7; max-width: 300px; }
  .onb-card { background: #fff; border: 1px solid #ece9e2; border-radius: 14px; padding: 20px; width: 100%; max-width: 340px; margin-bottom: 24px; text-align: left; }
  .onb-body { font-size: 13px; color: #444; line-height: 1.9; }
  .onb-btn { width: 100%; max-width: 340px; padding: 14px; background: #1D9E75; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .onb-input-wrap { width: 100%; max-width: 340px; }
  .onb-input { width: 100%; padding: 14px 16px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; font-family: inherit; outline: none; background: #fff; color: #1a1a1a; margin-bottom: 12px; }
  .onb-input:focus { border-color: #1D9E75; }
  .onb-help { font-size: 12px; color: #999; margin-bottom: 6px; text-align: left; }
  .onb-fallback { font-size: 11px; color: #bbb; text-align: left; margin-top: 4px; }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════
     FIX 2: PREMIUM LANGUAGE SELECTION SCREEN
     ══════════════════════════════════════════ -->
<div id="lang-screen">
  <div class="lang-logo">
    <svg width="72" height="72" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="60" cy="50" rx="40" ry="28" fill="#C8BC5A" stroke="#8B7A20" stroke-width="2"/>
      <ellipse cx="74" cy="42" rx="13" ry="9" fill="#D4849A" opacity="0.9"/>
      <ellipse cx="47" cy="54" rx="7" ry="5" fill="#f7f5f0"/>
      <rect x="57" y="72" width="6" height="30" rx="2.5" fill="#5C3D1E"/>
      <ellipse cx="60" cy="72" rx="5" ry="7" fill="#8B5E3C"/>
      <text x="26" y="57" font-family="Georgia,serif" font-size="24" font-weight="700" fill="#2C2C2A">D</text>
      <text x="66" y="96" font-family="Georgia,serif" font-size="19" font-style="italic" font-weight="600" fill="#9B4E2E">'art</text>
      <polygon points="53,100 60,114 67,100" fill="#D4849A"/>
    </svg>
  </div>
  <div class="lang-riad-name">Riad Dar D'Art</div>
  <div class="lang-subtitle">Marrakech, Medina</div>
  <div class="lang-choose">Choose your language</div>
  <div class="lang-list">
    <button class="lang-btn" onclick="selectLang('English','en')">
      <span class="lang-flag">🇬🇧</span>
      <span class="lang-name">English</span>
      <span class="lang-arrow">›</span>
    </button>
    <button class="lang-btn" onclick="selectLang('French','fr')">
      <span class="lang-flag">🇫🇷</span>
      <span class="lang-name">Français</span>
      <span class="lang-arrow">›</span>
    </button>
    <button class="lang-btn" onclick="selectLang('Spanish','es')">
      <span class="lang-flag">🇪🇸</span>
      <span class="lang-name">Español</span>
      <span class="lang-arrow">›</span>
    </button>
    <button class="lang-btn" onclick="selectLang('Italian','it')">
      <span class="lang-flag">🇮🇹</span>
      <span class="lang-name">Italiano</span>
      <span class="lang-arrow">›</span>
    </button>
    <button class="lang-btn" onclick="selectLang('German','de')">
      <span class="lang-flag">🇩🇪</span>
      <span class="lang-name">Deutsch</span>
      <span class="lang-arrow">›</span>
    </button>
    <button class="lang-btn" onclick="selectLang('Arabic','ar')" style="direction:rtl">
      <span class="lang-flag">🇲🇦</span>
      <span class="lang-name" style="text-align:right">العربية</span>
      <span class="lang-arrow">‹</span>
    </button>
  </div>
</div>

<!-- USAGE INSTRUCTIONS SCREEN -->
<div id="instruction-screen" class="onboarding-screen" style="display:none">
  <div style="font-size:40px;margin-bottom:16px">🌿</div>
  <div id="instr-title" class="onb-title"></div>
  <div class="onb-card">
    <div id="instr-body" class="onb-body" style="white-space:pre-line"></div>
  </div>
  <button id="instr-btn" class="onb-btn" onclick="enterSaveScreen()"></button>
</div>

<!-- SAVE TO HOME SCREEN -->
<div id="save-screen" class="onboarding-screen" style="display:none">
  <div id="save-icon" style="font-size:36px;margin-bottom:16px">📲</div>
  <div id="save-title" class="onb-title"></div>
  <div id="save-sub" class="onb-sub"></div>
  <div style="width:100%;max-width:340px;margin-bottom:16px">
    <div style="font-size:13px;font-weight:600;color:#555;margin-bottom:12px;text-align:left" id="save-device-q">What phone do you have?</div>
    <div style="display:flex;gap:10px">
      <button onclick="showDeviceInstructions('iphone')" style="flex:1;padding:14px;background:#fff;border:1.5px solid #ddd;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;color:#333">🍎 iPhone</button>
      <button onclick="showDeviceInstructions('android')" style="flex:1;padding:14px;background:#fff;border:1.5px solid #ddd;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;color:#333">🤖 Android</button>
    </div>
  </div>
  <div id="iphone-instructions" style="display:none;background:#fff;border:1px solid #ece9e2;border-radius:14px;padding:18px;width:100%;max-width:340px;margin-bottom:12px;text-align:left">
    <div style="font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:10px">🍎 iPhone — Safari</div>
    <div id="iphone-steps" style="font-size:12px;color:#555;line-height:1.9"></div>
  </div>
  <div id="android-instructions" style="display:none;background:#fff;border:1px solid #ece9e2;border-radius:14px;padding:18px;width:100%;max-width:340px;margin-bottom:12px;text-align:left">
    <div style="font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:10px">🤖 Android — Chrome</div>
    <div id="android-steps" style="font-size:12px;color:#555;line-height:1.9"></div>
  </div>
  <button id="save-continue-btn" class="onb-btn" onclick="enterNameScreen()" style="max-width:340px;margin-bottom:12px;margin-top:8px"></button>
</div>

<!-- ══════════════════════════════════════════
     FIX 4: RESERVATION NAME SCREEN (required)
     ══════════════════════════════════════════ -->
<div id="name-screen" class="onboarding-screen" style="display:none">
  <div style="margin-bottom:16px">
    <svg width="64" height="64" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="60" cy="50" rx="40" ry="28" fill="#C8BC5A" stroke="#8B7A20" stroke-width="2"/>
      <ellipse cx="74" cy="42" rx="13" ry="9" fill="#D4849A" opacity="0.9"/>
      <rect x="57" y="72" width="6" height="30" rx="2.5" fill="#5C3D1E"/>
      <ellipse cx="60" cy="72" rx="5" ry="7" fill="#8B5E3C"/>
      <text x="26" y="57" font-family="Georgia,serif" font-size="24" font-weight="700" fill="#2C2C2A">D</text>
      <text x="66" y="96" font-family="Georgia,serif" font-size="19" font-style="italic" font-weight="600" fill="#9B4E2E">'art</text>
      <polygon points="53,100 60,114 67,100" fill="#D4849A"/>
    </svg>
  </div>
  <div id="name-screen-title" class="onb-title"></div>
  <div class="onb-card" style="text-align:left;margin-bottom:20px;max-width:340px">
    <div id="name-screen-help" class="onb-help" style="font-size:13px;color:#555;margin-bottom:0;line-height:1.7"></div>
    <div id="name-screen-fallback" class="onb-fallback" style="font-size:12px;margin-top:8px"></div>
  </div>
  <div class="onb-input-wrap">
    <input id="guest-name-input" class="onb-input" type="text"
      onkeydown="if(event.key==='Enter') submitGuestName()"/>
    <!-- FIX 3: NO SKIP — required field -->
    <button id="name-submit-btn" class="onb-btn" onclick="submitGuestName()"></button>
  </div>
  <div id="name-required-msg" style="font-size:12px;color:#E24B4A;margin-top:8px;display:none"></div>
</div>

<!-- RIAD SELECTION SCREEN — shown after name, before main chat -->
<div id="riad-screen" class="onboarding-screen" style="display:none">
  <div style="margin-bottom:16px">
    <svg width="64" height="64" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="60" cy="50" rx="40" ry="28" fill="#C8BC5A" stroke="#8B7A20" stroke-width="2"/>
      <ellipse cx="74" cy="42" rx="13" ry="9" fill="#D4849A" opacity="0.9"/>
      <rect x="57" y="72" width="6" height="30" rx="2.5" fill="#5C3D1E"/>
      <ellipse cx="60" cy="72" rx="5" ry="7" fill="#8B5E3C"/>
      <text x="26" y="57" font-family="Georgia,serif" font-size="24" font-weight="700" fill="#2C2C2A">D</text>
      <text x="66" y="96" font-family="Georgia,serif" font-size="19" font-style="italic" font-weight="600" fill="#9B4E2E">'art</text>
      <polygon points="53,100 60,114 67,100" fill="#D4849A"/>
    </svg>

// Session tracking
const sessionBookings = [];
function trackBooking(entry) {
  sessionBookings.push(entry);
  try { localStorage.setItem('dda_bookings', JSON.stringify(sessionBookings)); } catch(e) {}
}
let taxiSelection = null;
const sessionButtons = [];
const sessionTopics = [];

function trackButton(label) { if(!sessionButtons.includes(label)) sessionButtons.push(label); }
function trackTopic(text) {
  const topic = text.trim().substring(0, 40) + (text.length > 40 ? '…' : '');
  if(sessionTopics.length < 15) sessionTopics.push(topic);
}

// ══════════════════════════════════════════════════════════
//  LOCAL STORAGE
// ══════════════════════════════════════════════════════════
const STORAGE_KEY = 'riad_dart_session_v2';

function saveSession() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      lang: selectedLang, langCode: selectedLangCode,
      reservationName: reservationName,
      history: history,
      chatHTML: document.getElementById('chat-box') ? document.getElementById('chat-box').innerHTML : '',
      savedAt: Date.now()
    }));
    // dda keys for same-day persistence
    if (reservationName) localStorage.setItem('dda_guestName', reservationName);
    if (selectedLangCode) localStorage.setItem('dda_langCode', selectedLangCode);
    localStorage.setItem('dda_history', JSON.stringify(history));
    localStorage.setItem('dda_savedDate', new Date().toDateString());
  } catch(e) {}
}

function loadSession() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return null;
    const s = JSON.parse(raw);
    if(new Date(s.savedAt).toDateString() !== new Date().toDateString()) { localStorage.removeItem(STORAGE_KEY); return null; }
    return s;
  } catch(e) { return null; }
}

function clearSession() {
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem('dda_guestName');
  localStorage.removeItem('dda_langCode');
  localStorage.removeItem('dda_history');
  localStorage.removeItem('dda_savedDate');
  localStorage.removeItem('dda_riad');
  localStorage.removeItem('dda_locked');
  localStorage.removeItem('dda_bookings');
  localStorage.removeItem('followupStartTime');
  localStorage.removeItem('followupShown');
  // Clear upsell_initial key for this guest
  const upsellInitKey = 'upsell_initial_' + (reservationName || 'guest').replace(/\s+/g,'_').toLowerCase();
  localStorage.removeItem(upsellInitKey);
  // Clear spa offer key for this guest
  const spaKey = 'spaOfferShown_' + (reservationName || 'guest').replace(/\s+/g,'_').toLowerCase();
  localStorage.removeItem(spaKey);
}

  else if(spaService === 'massage' && spaDuration && n) { const pp = spaDuration === '30' ? 30 : 40; p = `Total: ${n*pp}€  (${n} × ${pp}€)`; }
  else if(spaService === 'both' && spaDuration && n) { const mp = spaDuration === '30' ? 30 : 40; p = `Total: ${n*(20+mp)}€  (${n} × ${20+mp}€/person)`; }
  el.textContent = p;

  const durationOk = (spaService !== 'massage' && spaService !== 'both') || !!spaDuration;
  const peopleOk = spaService !== 'hammam' || parseInt(spaPeople) >= 2;
  const valid = spaService && spaPeople && time && durationOk && peopleOk;
  btn.textContent = t.sendWa;
  btn.style.display = valid ? 'block' : 'none';
}

function parseHour(timeStr) {
  if(!timeStr) return NaN;
  timeStr = timeStr.trim().toLowerCase();
  const pmMatch = timeStr.match(/(\d+)(?::(\d+))?\s*pm/);
  if(pmMatch) {
    let h = parseInt(pmMatch[1]);
    if(h !== 12) h += 12;
    return h;
  }
  const amMatch = timeStr.match(/(\d+)(?::(\d+))?\s*am/);
  if(amMatch) {
    let h = parseInt(amMatch[1]);
    if(h === 12) h = 0;
    return h;
  }
  const colonMatch = timeStr.match(/^(\d+):(\d+)/);
  if(colonMatch) return parseInt(colonMatch[1]);
  const numMatch = timeStr.match(/^(\d+)/);
  if(numMatch) return parseInt(numMatch[1]);
  return NaN;
}

function processReply(text) {
  const t = T[selectedLangCode] || T['en'];
  let clean = text
    .replace(/\*\*(.*?)\*\*/g, '$1')
    .replace(/\*(.*?)\*/g, '$1')
    .replace(/__(.*?)__/g, '$1')
    .replace(/_(.*?)_/g, '$1')
    .replace(/#{1,6}\s/g, '')
    .replace(/`(.*?)`/g, '$1');
  let tag = null;
  if(clean.includes('[SHOW_BOOKING]')) { clean = clean.replace('[SHOW_BOOKING]', '').trim(); tag = 'booking'; }
  else if(clean.includes('[SHOW_REVIEW]')) { clean = clean.replace('[SHOW_REVIEW]', '').trim(); tag = 'review'; }
  else if(clean.includes('[SHOW_CONTACT]')) { clean = clean.replace('[SHOW_CONTACT]', '').trim(); tag = 'contact'; }
  if(clean) { const d = document.createElement('div'); d.className = 'msg msg-bot'; d.textContent = clean; chatBox.appendChild(d); }
  if(tag === 'booking') {
    const c = document.createElement('div'); c.className = 'action-card';
    c.innerHTML = `<div class="action-card-title">${t.bookingReq}</div><a class="action-btn btn-teal" href="${RECEPTION_WA}" target="_blank">${t.contactBtn}</a>`;
    chatBox.appendChild(c);
  } else if(tag === 'review') {
    const c = document.createElement('div'); c.className = 'action-card';
    c.innerHTML = `<div class="action-card-title">${t.reviewTitle}</div><a class="action-btn btn-green" href="${GMAPS}" target="_blank">⭐ Google Review</a><a class="action-btn btn-blue" href="${BOOKING_URL}" target="_blank">🏨 Booking.com Review</a><a class="action-btn btn-teal" href="${RECEPTION_WA}" target="_blank">${t.contactBtn}</a>`;
    chatBox.appendChild(c);
  } else if(tag === 'contact') {
    const c = document.createElement('div'); c.className = 'action-card';
    c.innerHTML = `<div class="action-card-title">${t.contactTitle}</div><a class="action-btn btn-reception" href="${RECEPTION_WA}" target="_blank">${t.contactBtn}</a>`;
    chatBox.appendChild(c);
  }
  chatBox.scrollTop = chatBox.scrollHeight;
}

  const text = chatInput.value.trim(); if(!text) return;
  trackTopic(text);
  chatInput.value = ''; sendBtn.disabled = true;
  const um = document.createElement('div'); um.className = 'msg msg-user'; um.textContent = text; chatBox.appendChild(um);
  history.push({ role: 'user', content: text || '' });
  saveSession();
  const loading = document.createElement('div'); loading.className = 'msg msg-bot msg-loading'; loading.textContent = '...'; chatBox.appendChild(loading);
  chatBox.scrollTop = chatBox.scrollHeight;
  const systemPrompt = SYSTEM_BASE.replace('{LANG}', selectedLang).replace('{WIFI}', WIFI_PASSWORD);
  console.log("SENDING HISTORY:", JSON.stringify(history));
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: systemPrompt, messages: history })
    });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    console.log("API RESPONSE:", data);
    const reply =
      data?.content?.[0]?.text ||
      data?.output_text ||
      data?.message ||
      '';
    if(!reply) throw new Error('Empty response from API');
    loading.remove();
    processReply(reply);
    console.log("REPLY:", reply);
    // Strip action tags before saving — Anthropic API rejects non-empty tags in assistant turns
    // Also guard against empty string after stripping (would cause API error on next call)
    const cleanReply = reply.replace(/\[SHOW_CONTACT\]|\[SHOW_BOOKING\]|\[SHOW_REVIEW\]/g, '').trim();
    history.push({ role: 'assistant', content: cleanReply || '...' });
    saveSession();
  } catch(e) {
    console.error('CHAT ERROR:', e);
    loading.remove();
    const t = T[selectedLangCode] || T['en'];
    const c = document.createElement('div'); c.className = 'action-card';
    c.innerHTML = `<div class="action-card-title">${t.contactTitle}</div><a class="action-btn btn-reception" href="${RECEPTION_WA}" target="_blank">${t.contactBtn}</a>`;
    chatBox.appendChild(c); chatBox.scrollTop = chatBox.scrollHeight;
  }
  sendBtn.disabled = false;
}

  const start = localStorage.getItem('followupStartTime');
  const shown = localStorage.getItem('followupShown');
  if(!start || shown === 'true') return true; // nothing to do
  const TWO_HOURS = 2 * 60 * 60 * 1000;
  if(Date.now() - parseInt(start) < TWO_HOURS) return false; // not yet
  showUpsellFollowup();
  return true;
}

async function translateToDarija() {
  const input = document.getElementById('darija-input');
  if(!input) return;
  const text = input.value.trim();
  if(!text) return;

  const cb = document.getElementById('chat-box');

  // Show user message
  const userMsg = document.createElement('div');
  userMsg.className = 'msg msg-user';
  userMsg.textContent = text;
  cb.appendChild(userMsg);

  // Show loading
  const loading = document.createElement('div');
  loading.className = 'msg msg-bot msg-loading';
  loading.textContent = '...';
  cb.appendChild(loading);
  cb.scrollTop = cb.scrollHeight;

  const userLangName = selectedLangCode === 'fr' ? 'French' : selectedLangCode === 'es' ? 'Spanish' : selectedLangCode === 'de' ? 'German' : selectedLangCode === 'it' ? 'Italian' : selectedLangCode === 'ar' ? 'Arabic' : 'English';
  const darijaSystem = `You are an expert translator specializing exclusively in Moroccan Darija (Moroccan Arabic dialect as actually spoken in Morocco — NOT Modern Standard Arabic, NOT Egyptian Arabic, NOT Fusha).

The guest will write a word or phrase in their language (English, French, Spanish, German, Italian, or Russian). You must translate it into authentic Moroccan Darija only.

Always respond in this exact format and nothing else:
🇲🇦 Darija: [translation in Arabic script]
🔤 Pronunciation: [translation in Latin letters, exactly how it sounds]

Rules:
- Use ONLY real Moroccan Darija words as spoken in Marrakech
- NEVER use Modern Standard Arabic (Fusha) words
- NEVER add explanations, greetings, or extra text
- NEVER translate to anything other than Darija
- If the input is unclear, make your best guess and translate anyway
- Keep it short and accurate — one clean answer only

Examples:
Input: 'thank you' → 🇲🇦 Darija: شكرًا / بارك الله فيك 🔤 Pronunciation: shukran / barakallah fik
Input: 'where is the bathroom?' → 🇲🇦 Darija: فين كاين الحمام؟ 🔤 Pronunciation: fin kayn l-hammam?
Input: 'you are beautiful' → 🇲🇦 Darija: نتي زوينة (to a woman) / نتا زوين (to a man) 🔤 Pronunciation: nti zwina / nta zwin`;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: darijaSystem, messages: [{ role: 'user', content: text }] })
    });
    const data = await res.json();
    const reply = data?.content?.[0]?.text || data?.output_text || data?.message || '';
    loading.remove();

    if(!reply) throw new Error('Empty response');

    const botMsg = document.createElement('div');
    botMsg.className = 'msg msg-bot';
    botMsg.textContent = reply;
    cb.appendChild(botMsg);

    // Extract Arabic script from reply for speech synthesis
    const arabicMatch = reply.match(/[\u0600-\u06FF\u0750-\u077F]+(?:\s+[\u0600-\u06FF\u0750-\u077F]+)*/);
    if(arabicMatch) {
      const arabicText = arabicMatch[0];
      const listenBtn = document.createElement('button');
      listenBtn.className = 'action-btn btn-green';
      listenBtn.style.cssText = 'margin-top:4px;max-width:160px;align-self:flex-start;';
      listenBtn.textContent = (T[selectedLangCode] || T['en']).farewellListenBtn || '🔊 Listen';
      listenBtn.onclick = () => {
        const utterance = new SpeechSynthesisUtterance(arabicText);
        // Try ar-MA first, fall back to ar-SA
        const voices = window.speechSynthesis.getVoices();
        const arMA = voices.find(v => v.lang === 'ar-MA');
        utterance.lang = arMA ? 'ar-MA' : 'ar-SA';
        utterance.rate = 0.8;
        window.speechSynthesis.speak(utterance);
      };
      cb.appendChild(listenBtn);
    }

    // Clear input for next translation
    input.value = '';
    input.blur();
    cb.scrollTop = cb.scrollHeight;
  } catch(err) {
    loading.remove();
    const errMsg = document.createElement('div');
    errMsg.className = 'msg msg-bot';
    errMsg.textContent = '⚠️ Translation failed. Please try again.';
    cb.appendChild(errMsg);
    cb.scrollTop = cb.scrollHeight;
  }
}

function toStars(n) {

  return '⭐'.repeat(n);

// ── USEFUL QUESTIONS: filters out routine topics, keeps only new/unexpected ones ──
function getUsefulQuestions() {
  const ignoreKeywords = [
    'wifi','wi-fi','password',
    'breakfast',
    'pool',
    'taxi','airport',
    'spa','hammam','massage',
    'checkout',
    'location',
    'riad',
    'hello','hi'
  ];
  const filtered = sessionTopics.filter(q => {
    const text = q.toLowerCase();
    if(text.length < 8) return false;
    for (let k of ignoreKeywords) {
      if(text.includes(k)) return false;
    }
    return true;
  });
  const unique = [...new Set(filtered)];
  return unique.slice(0, 5);
}

function submitSurvey() {
  const btn = document.getElementById('submit-survey-btn');
  btn.disabled = true; btn.textContent = '...';

  // Hard deadline — show thankyou no matter what within 10 seconds
  const hardDeadline = setTimeout(() => completeCheckout(), 10000);

  function completeCheckout() {
    clearTimeout(hardDeadline);
    const t = T[selectedLangCode] || T['en'];
    document.getElementById('survey-form').style.display = 'none';
    document.getElementById('thankyou-screen').style.display = 'block';
    document.getElementById('ty-name').textContent = t.tyTitle(name);
    document.getElementById('ty-sub').textContent = t.tySub;
    document.getElementById('ty-review-title').textContent = t.tyReview;
    const tyContact = document.getElementById('ty-contact-btn');
    if(tyContact) tyContact.textContent = t.tyContact;
    checkoutDone = true;
    const chatTab = document.getElementById('tab-chat-btn');
    if(chatTab) { chatTab.style.pointerEvents = 'none'; chatTab.style.opacity = '0.35'; }
    localStorage.setItem('dda_lockedName', reservationName);
    localStorage.setItem('dda_lockedLang', selectedLangCode);
    localStorage.setItem('dda_lockedRiad', localStorage.getItem('dda_riad') || '141');
    clearSession();
    localStorage.setItem('dda_locked', 'true');
    const ci = document.getElementById('chat-input');
    const sb = document.getElementById('send-btn');
    if(ci) { ci.disabled = true; ci.placeholder = '—'; }
    if(sb) sb.disabled = true;
    const sugg = document.getElementById('suggestions');
    if(sugg) sugg.style.display = 'none';
    showFarewellCard(name);
  }

  try {
  const t = T[selectedLangCode] || T['en'];
  const name = document.getElementById('guest-name').value.trim() || reservationName || 'Guest';
  const STAR_LABELS = ['', '⭐ Needs improvement', '⭐⭐ Poor', '⭐⭐⭐ Acceptable', '⭐⭐⭐⭐ Good', '⭐⭐⭐⭐⭐ Excellent'];
  const cmtStaff     = document.getElementById('cmt-staff').value.trim();
  const cmtRoom      = document.getElementById('cmt-room').value.trim();
  const cmtBreakfast = document.getElementById('cmt-breakfast').value.trim();
  const cmtFinal     = document.getElementById('cmt-final').value.trim();
  const sections = [
    { key: 'staff', label: 'Staff & Service', comment: cmtStaff },
    { key: 'room', label: 'Room', comment: cmtRoom },
    { key: 'breakfast', label: 'Breakfast', comment: cmtBreakfast },
    { key: 'hammam', label: 'Hammam', comment: '' },
    { key: 'massage', label: 'Massage', comment: '' },
    { key: 'transport', label: 'Airport Transfer', comment: '' },
  ];
  const today = new Date().toLocaleDateString('en-GB');
  const langNameEn = { en: 'English', fr: 'French', es: 'Spanish', it: 'Italian', de: 'German', ar: 'Arabic' }[selectedLangCode] || selectedLang;

  // Combine all comment boxes into one field, labelled, skipping empties
  const commentParts = [];
  if (cmtStaff)     commentParts.push('Staff: ' + cmtStaff);
  if (cmtRoom)      commentParts.push('Room: ' + cmtRoom);
  if (cmtBreakfast) commentParts.push('Breakfast: ' + cmtBreakfast);
  if (cmtFinal)     commentParts.push('General: ' + cmtFinal);
  const combinedComment = commentParts.join(' | ') || '';

  const hammamTried    = document.getElementById('hammam-yes').classList.contains('selected');
  const massageTried   = document.getElementById('massage-yes').classList.contains('selected');
  const transportTried = document.getElementById('transport-yes').classList.contains('selected');

  // ── GOOGLE SHEET (internal — full data, sent silently in background) ──
  const sheetData = {
    date: today,
    guestName: name,
    language: langNameEn,
    bookings: sessionBookings.length > 0 ? sessionBookings.join(', ') : 'None',
    staffRating:     ratings.staff     ? String(ratings.staff)     : '',
    roomRating:      ratings.room      ? String(ratings.room)      : '',
    breakfastRating: ratings.breakfast ? String(ratings.breakfast) : '',
    hammamRating:    hammamTried    ? (ratings.hammam    ? String(ratings.hammam)    : 'Yes') : 'No',
    massageRating:   massageTried   ? (ratings.massage   ? String(ratings.massage)   : 'Yes') : 'No',
    transportRating: transportTried ? (ratings.transport ? String(ratings.transport) : 'Yes') : 'No',
    finalComment: combinedComment,
    new_questions: getUsefulQuestions().join(' | ') || 'None'
  };
  console.log("SESSION TOPICS:", sessionTopics);
  console.log("FILTERED QUESTIONS:", getUsefulQuestions());
  fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sheetData: sheetData })
  }).then(() => { localStorage.removeItem('dda_bookings'); }).catch(() => {});

  // ── WHATSAPP SUMMARY — reception only, no guest questions or tracking data ──
  let summary = `📋 *Checkout Summary — Riad Dar D'Art*\n\n`;
  summary += `📅 Date: ${today}\n`;
  summary += `👤 Guest: *${name}*\n`;
  summary += `🌐 Language: ${langNameEn}\n\n`;
  if(sessionBookings.length > 0) {
    summary += `🛎️ *Services booked:*\n`;
    sessionBookings.forEach(b => { summary += `• ${b}\n`; });
    summary += '\n';
  } else { summary += `🛎️ No extra services booked\n\n`; }
  if(taxiSelection) {
    summary += `\n🚖 Airport Transfer requested: ${taxiSelection}\n`;
  }
  // NOTE: sessionTopics and sessionButtons intentionally excluded — internal data only
  const ratedSections = sections.filter(s => ratings[s.key] > 0);
  if(ratedSections.length > 0) {
    summary += `⭐ *Satisfaction ratings:*\n`;
    ratedSections.forEach(s => { summary += `• ${s.label}: ${STAR_LABELS[ratings[s.key]]}${s.comment ? ` — "${s.comment}"` : ''}\n`; });
  }
  if(cmtFinal) summary += `\n💬 *Guest message:*\n"${cmtFinal}"`;

  // Send checkout summary to reception only
  setTimeout(() => {
    const enc = encodeURIComponent(summary);
    const l1 = document.createElement('a');
    l1.href = RECEPTION_WA + '?text=' + enc;
    l1.target = '_blank'; l1.style.display = 'none';
    document.body.appendChild(l1); l1.click();
    setTimeout(() => document.body.removeChild(l1), 1000);
  }, 300);

  // Show "back to card" button after WhatsApp has opened
  setTimeout(() => {
    const backBtn = document.getElementById('farewell-back-btn');
    if(backBtn) {
      const t = T[selectedLangCode] || T['en'];
      backBtn.textContent = t.farewellBack;
      backBtn.style.display = 'block';
    }
  }, 2000);

  // ── FIX 6: LOW RATING ALERT — sent to reception only (manager number completely removed) ──
  const lowRatings = sections.filter(s => ratings[s.key] > 0 && ratings[s.key] <= 3);
  if(lowRatings.length > 0) {
    let msg = `🚨 *Alert — Low Ratings — Riad Dar D'Art*\n\n`;
    msg += `👤 Guest: *${name}*\n🌐 Language: ${langNameEn}\n\n`;
    msg += `⚠️ *Low ratings received:*\n`;
    lowRatings.forEach(s => {
      msg += `• ${s.label}: ${STAR_LABELS[ratings[s.key]]}`;
      if(s.comment) msg += `\n  💬 "${s.comment}"`;
      msg += '\n';
    });
    if(cmtFinal) msg += `\n💬 *Guest message:*\n"${cmtFinal}"`;
    msg += `\n\n📋 Please follow up with this guest as soon as possible.`;
    // Alert goes to RECEPTION only — manager number removed
    const alertUrl = `${RECEPTION_WA}?text=${encodeURIComponent(msg)}`;
    setTimeout(() => {
      const link = document.createElement('a');
      link.href = alertUrl; link.target = '_blank'; link.style.display = 'none';
      document.body.appendChild(link); link.click();
      setTimeout(() => document.body.removeChild(link), 1000);
    }, 3500);
  }

  setTimeout(() => completeCheckout(), 800);
  } catch(e) {
    console.error('submitSurvey error:', e);
    setTimeout(() => completeCheckout(), 800);
  }
}
